<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safarancho Pager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a1628; color: #e0e0e0; }
  #app { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
  header { background: #1a2744; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; color: #4fc3f7; }
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }
  #register-form { padding: 24px; display: flex; flex-direction: column; gap: 12px; justify-content: center; flex: 1; }
  #register-form input, #register-form button { padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
  #register-form input { background: #1a2744; color: #e0e0e0; }
  #register-form button { background: #4fc3f7; color: #0a1628; font-weight: bold; cursor: pointer; }
  #contacts-list { flex: 1; overflow-y: auto; padding: 8px; }
  .contact { padding: 12px 16px; border-radius: 8px; margin: 4px 0; cursor: pointer; background: #1a2744; }
  .contact:hover { background: #243656; }
  #chat-screen { flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; }
  .msg.mine { align-self: flex-end; background: #4fc3f7; color: #0a1628; }
  .msg.theirs { align-self: flex-start; background: #1a2744; }
  .msg .meta { font-size: 10px; opacity: 0.7; margin-top: 4px; }
  #chat-input { display: flex; gap: 8px; padding: 12px; background: #1a2744; }
  #chat-input input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #0a1628; color: #e0e0e0; font-size: 14px; }
  #chat-input button { padding: 10px 16px; border-radius: 8px; border: none; background: #4fc3f7; color: #0a1628; font-weight: bold; cursor: pointer; }
  .ss-badge { font-size: 12px; color: #78909c; }
  #my-id { padding: 8px 16px; font-size: 12px; color: #78909c; background: #0d1f3c; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🏊 Safarancho Pager</h1>
    <span id="my-ss" class="ss-badge"></span>
  </header>

  <div id="register-screen" class="screen active">
    <form id="register-form">
      <h2 style="text-align:center; color:#4fc3f7;">Join the Team</h2>
      <input id="reg-name" placeholder="Username" required>
      <input id="reg-display" placeholder="Display Name" required>
      <button type="submit">Register</button>
    </form>
  </div>

  <div id="contacts-screen" class="screen">
    <div id="my-id"></div>
    <div id="contacts-list"></div>
  </div>

  <div id="chat-screen" class="screen">
    <div id="chat-header" style="padding:8px 16px; background:#1a2744;">
      <span id="chat-with"></span>
      <button onclick="showScreen('contacts-screen')" style="float:right; background:none; border:none; color:#4fc3f7; cursor:pointer;">← Back</button>
    </div>
    <div id="messages"></div>
    <div id="chat-input">
      <input id="msg-input" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let mySS = localStorage.getItem('ss_id');
let myName = localStorage.getItem('display_name');
let ws = null;
let chatWith = null;
let pollTimer = null;

// --- Screens ---
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'contacts-screen') loadContacts();
}

// --- Register ---
document.getElementById('register-form').onsubmit = async (e) => {
  e.preventDefault();
  const name = document.getElementById('reg-name').value.trim();
  const display_name = document.getElementById('reg-display').value.trim();
  const res = await fetch(API + '/register', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, display_name})
  });
  const data = await res.json();
  mySS = data.ss_id;
  myName = data.display_name;
  localStorage.setItem('ss_id', mySS);
  localStorage.setItem('display_name', myName);
  initSession();
};

// --- Init ---
function initSession() {
  if (!mySS) return;
  document.getElementById('my-ss').textContent = mySS;
  document.getElementById('my-id').textContent = 'Your SS-ID: ' + mySS;
  showScreen('contacts-screen');
  connectWS();
}

// --- Contacts ---
async function loadContacts() {
  const res = await fetch(API + '/contacts');
  const contacts = await res.json();
  const list = document.getElementById('contacts-list');
  list.innerHTML = '';
  contacts.filter(c => c.ss_id !== mySS).forEach(c => {
    const div = document.createElement('div');
    div.className = 'contact';
    div.textContent = c.display_name + ' (' + c.ss_id + ')';
    div.onclick = () => openChat(c.ss_id, c.display_name);
    list.appendChild(div);
  });
}

// --- Chat ---
async function openChat(ss_id, name) {
  chatWith = ss_id;
  document.getElementById('chat-with').textContent = name;
  showScreen('chat-screen');
  await loadMessages();
  document.getElementById('msg-input').focus();
}

async function loadMessages() {
  if (!chatWith) return;
  const res = await fetch(API + '/messages/' + mySS + '?limit=100');
  const msgs = await res.json();
  const box = document.getElementById('messages');
  box.innerHTML = '';
  msgs.reverse().filter(m =>
    (m.from_ss === mySS && m.to_ss === chatWith) ||
    (m.from_ss === chatWith && m.to_ss === mySS)
  ).forEach(m => appendMsg(m));
  box.scrollTop = box.scrollHeight;
}

function appendMsg(m) {
  const div = document.createElement('div');
  div.className = 'msg ' + (m.from_ss === mySS ? 'mine' : 'theirs');
  div.innerHTML = m.text + '<div class="meta">' + new Date(m.created_at).toLocaleTimeString() + '</div>';
  document.getElementById('messages').appendChild(div);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !chatWith) return;
  input.value = '';
  // Send via WS if connected, else HTTP
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({action:'send', to_ss: chatWith, text}));
  } else {
    await fetch(API + '/message', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({from_ss: mySS, to_ss: chatWith, text})
    });
  }
  // Optimistic append
  appendMsg({from_ss: mySS, text, created_at: new Date().toISOString()});
  document.getElementById('messages').scrollTop = 999999;
}

document.getElementById('msg-input').onkeydown = (e) => {
  if (e.key === 'Enter') sendMessage();
};

// --- WebSocket ---
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws/' + mySS);
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (chatWith && (m.from_ss === chatWith || m.to_ss === chatWith)) {
      appendMsg(m);
      document.getElementById('messages').scrollTop = 999999;
    }
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

// --- Boot ---
if (mySS) initSession();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAGER v6.0 | SPORTS-PUNK</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a14;
            --card: #0f172a;
            --neon: #ff6d00;
            --neon-glow: 0 0 15px rgba(255, 109, 0, 0.4), 0 0 30px rgba(255, 109, 0, 0.1);
            --text: #e2e8f0; --dim: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 15px; background: #000; border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
        }
        h1 { font-size: 1.1rem; color: var(--neon); letter-spacing: 2px; }
        #lamp { width: 14px; height: 14px; border-radius: 50%; background: #222; transition: all 0.3s; }
        #lamp.active { background: var(--neon); box-shadow: var(--neon-glow); animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

        main { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: var(--card); padding: 10px; border-radius: 6px; border-left: 3px solid var(--dim); font-size: 0.85rem; }
        .msg.inbound { border-left-color: var(--neon); }

        /* ATHLETS / CONTACTS ROW */
        #athletes-row { 
            padding: 10px; background: #000; display: flex; gap: 10px; overflow-x: auto; 
            border-top: 1px solid #1e293b; border-bottom: 1px solid #1e293b;
        }
        .athlete-btn { 
            background: #111; border: 1px solid #333; color: var(--neon); padding: 6px 12px; 
            border-radius: 4px; font-size: 0.7rem; white-space: nowrap; cursor: pointer;
        }
        .athlete-btn:active { background: var(--neon); color: #000; }

        footer { padding: 15px; background: #000; display: flex; flex-direction: column; gap: 8px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div><h1>PAGER v6.0</h1> <div style="font-size:0.55rem; color:var(--dim)">SYNC: FITNESS_BOT_MONGO</div></div>
        <div id="lamp"></div>
    </header>

    <div id="athletes-row">
        <!-- Load from /api/athletes -->
        <span style="color:var(--dim); font-size:0.6rem">SCANNING ATHLETES...</span>
    </div>

    <main id="messages"><div class="msg">SYSTEM: Link established.</div></main>

    <footer>
        <input type="text" id="target" placeholder="TARGET SSID">
        <input type="text" id="payload" placeholder="MESSAGE">
        <button onclick="send()">TRANSMIT</button>
    </footer>

    <script>
        const lamp = document.getElementById('lamp');
        const msgs = document.getElementById('messages');
        let ws;

        async function loadAthletes() {
            try {
                const res = await fetch('/api/athletes');
                const data = await res.json();
                const row = document.getElementById('athletes-row');
                row.innerHTML = data.length ? '' : '<span style="color:var(--dim); font-size:0.6rem">NO ATHLETES FOUND</span>';
                data.forEach(a => {
                    const btn = document.createElement('div');
                    btn.className = 'athlete-btn';
                    btn.innerText = (a.first_name || a.username || a.name || 'ANON').toUpperCase();
                    btn.onclick = () => { document.getElementById('target').value = a.pager_ssid; };
                    row.appendChild(btn);
                });
            } catch(e) { console.error('Athletes scan failed'); }
        }

        function connect() {
            ws = new WebSocket(`ws://${location.host}/ws/main_session`);
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                lamp.classList.add('active'); setTimeout(() => lamp.classList.remove('active'), 2500);
                const div = document.createElement('div'); div.className = 'msg inbound';
                div.innerText = `[INBOUND]: ${d.text}`; msgs.prepend(div);
            };
        }

        async function send() {
            const text = document.getElementById('payload').value;
            const target = document.getElementById('target').value;
            const res = await fetch('/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, target })
            });
            if (res.ok) {
                const div = document.createElement('div'); div.className = 'msg';
                div.innerText = `[SENT]: ${text}`; msgs.prepend(div);
                document.getElementById('payload').value = '';
            }
        }
        connect(); loadAthletes();
    </script>
</body>
</html>

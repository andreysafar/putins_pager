<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAGER v6.5 | MESH NETWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a14;
            --neon: #ff6d00;
            --neon-glow: rgba(255,109,0,0.5);
            --neon-dim: rgba(255,109,0,0.15);
            --cyan: #00e5ff;
            --cyan-glow: rgba(0,229,255,0.4);
            --text: #e2e8f0;
            --dim: #64748b;
            --card: #0f172a;
            --surface: #0a0f1a;
            --border: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 2px; }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255,109,0,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0,229,255,0.02) 0%, transparent 50%);
        }

        /* ========== REGISTRATION ========== */
        #reg-box {
            background: linear-gradient(135deg, var(--card) 0%, #0d1117 100%);
            padding: 40px 30px;
            border-radius: 16px;
            margin: 15vh 16px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            animation: fadeInUp 0.6s ease-out;
        }
        #reg-box h2 {
            color: var(--neon);
            margin-bottom: 10px;
            font-size: 1.4rem;
            text-shadow: 0 0 20px var(--neon-glow);
        }
        #reg-box p { font-size: 0.75rem; color: var(--text); margin-bottom: 24px; line-height: 1.6; }
        #reg-box .sub { font-size: 0.55rem; color: var(--dim); margin-top: 20px; letter-spacing: 2px; }

        /* ========== HEADER ========== */
        header {
            padding: 14px 16px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            animation: headerGlow 3s ease-in-out infinite;
        }
        @keyframes headerGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        h1 { font-size: 1rem; color: var(--neon); text-shadow: 0 0 10px var(--neon-glow); }
        .header-info { font-size: 0.55rem; color: var(--dim); margin-top: 2px; }

        /* Lamp */
        #lamp {
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #1a1a2e;
            border: 2px solid #333;
            transition: all 0.3s ease;
            position: relative;
        }
        #lamp.active {
            background: var(--neon);
            border-color: var(--neon);
            box-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon-glow);
            animation: lampPulse 0.6s ease-in-out infinite alternate;
        }
        @keyframes lampPulse {
            0% { box-shadow: 0 0 15px var(--neon), 0 0 30px var(--neon-glow); transform: scale(1); }
            100% { box-shadow: 0 0 25px var(--neon), 0 0 50px var(--neon-glow); transform: scale(1.15); }
        }

        /* ========== MESH STATUS BAR ========== */
        #mesh-status {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 0.55rem;
            color: var(--dim);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-green { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
        .dot-orange { background: var(--neon); box-shadow: 0 0 6px var(--neon-glow); }
        .dot-red { background: #ff5252; box-shadow: 0 0 6px rgba(255,82,82,0.5); }

        /* ========== CONTACTS PANEL ========== */
        #contacts-panel {
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            min-height: 60px;
            align-items: center;
            flex-wrap: nowrap;
            scrollbar-width: none;
        }
        #contacts-panel::-webkit-scrollbar { display: none; }
        .contact-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.7rem;
            white-space: nowrap;
            cursor: pointer;
            color: var(--neon);
            transition: all 0.25s ease;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .contact-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,109,0,0.08), transparent);
            transition: left 0.5s ease;
        }
        .contact-card:hover { border-color: var(--neon); box-shadow: 0 0 16px var(--neon-glow); transform: translateY(-2px); }
        .contact-card:hover::before { left: 100%; }
        .contact-card .ssid { font-size: 0.5rem; color: var(--dim); margin-top: 3px; }

        /* ========== MAIN CHAT ========== */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
        }
        .msg {
            background: var(--card);
            padding: 14px 16px;
            border-radius: 12px;
            border-left: 3px solid var(--dim);
            font-size: 0.85rem;
            line-height: 1.5;
            animation: msgIn 0.3s ease-out;
            transition: transform 0.2s;
        }
        .msg:hover { transform: translateX(4px); }
        .msg.inbound { border-left-color: var(--neon); box-shadow: -4px 0 20px var(--neon-dim); }
        .msg .meta { font-size: 0.55rem; color: var(--dim); margin-bottom: 6px; letter-spacing: 0.5px; }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== FOOTER ========== */
        footer {
            padding: 14px 16px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-group { display: flex; gap: 10px; align-items: center; }
        input {
            background: #111827;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 14px;
            border-radius: 8px;
            outline: none;
            flex: 1;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 12px var(--neon-dim); }
        input::placeholder { color: #374151; }

        /* Buttons */
        button {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        button::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: all 0.4s ease;
            transform: translate(-50%, -50%);
        }
        button:active::after { width: 200px; height: 200px; opacity: 0; }
        button:hover {
            box-shadow: 0 0 20px var(--neon-glow), 0 0 40px rgba(255,109,0,0.2);
            transform: translateY(-1px);
        }
        .btn-small {
            padding: 8px 14px !important;
            font-size: 0.55rem !important;
            background: var(--card) !important;
            color: var(--neon) !important;
            border: 1px solid var(--border) !important;
        }
        .btn-small:hover {
            border-color: var(--neon) !important;
            background: rgba(255,109,0,0.1) !important;
        }

        /* ========== DOWNLOAD NODE KIT BUTTON ========== */
        .btn-download {
            background: transparent !important;
            color: var(--cyan) !important;
            border: 1px solid var(--cyan) !important;
            padding: 10px 18px !important;
            font-size: 0.65rem !important;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
        .btn-download::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,229,255,0.1), transparent);
            border-radius: 8px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-download:hover {
            color: #fff !important;
            box-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(0,229,255,0.15), inset 0 0 20px rgba(0,229,255,0.1) !important;
            border-color: var(--cyan) !important;
            text-shadow: 0 0 8px var(--cyan);
            transform: translateY(-2px);
        }
        .btn-download:hover::before { opacity: 1; }
        .btn-download:active { transform: translateY(0); }
        .btn-downloading {
            pointer-events: none;
            opacity: 0.6;
            animation: downloadPulse 1s ease-in-out infinite;
        }
        @keyframes downloadPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ========== UTILITIES ========== */
        .empty-contacts { color: var(--dim); font-size: 0.6rem; padding: 10px; text-align: center; }
        .loading { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== MOBILE-FIRST RESPONSIVE ========== */
        @media (max-width: 480px) {
            header { padding: 10px 12px; }
            h1 { font-size: 0.85rem; }
            .header-info { font-size: 0.5rem; }
            #mesh-status { padding: 6px 12px; gap: 12px; font-size: 0.5rem; }
            #contacts-panel { padding: 8px 12px; }
            .contact-card { padding: 8px 12px; font-size: 0.6rem; }
            main { padding: 10px; gap: 8px; }
            .msg { padding: 10px 12px; font-size: 0.8rem; border-radius: 8px; }
            footer { padding: 10px 12px; gap: 8px; }
            input { padding: 10px 12px; font-size: 0.75rem; }
            button { padding: 10px 16px; font-size: 0.7rem; }
            .btn-download { font-size: 0.6rem !important; padding: 8px 14px !important; }
            #reg-box { margin: 10vh 12px; padding: 30px 20px; }
            #reg-box h2 { font-size: 1.1rem; }
        }
        @media (min-width: 768px) {
            .input-group.actions { justify-content: flex-start; }
        }
    </style>
</head>
<body>
    <div id="reg-box" style="display:none">
        <h2>📟 PAGER v6.5</h2>
        <p>ANONYMOUS MESH NETWORK ENTRY<br>Генерация временного SSID для связи</p>
        <button onclick="registerAnon()">⚡ ACQUIRE SSID</button>
        <div class="sub">SPORTS-PUNK EDITION 🦾⚙️</div>
    </div>

    <div id="app-ui" style="display:none; flex-direction:column; height:100vh">
        <header>
            <div>
                <h1>📟 PAGER v6.5</h1>
                <div class="header-info" id="my-id">OWNER: LOADING...</div>
            </div>
            <div id="lamp"></div>
        </header>

        <div id="mesh-status">
            <div class="status-item"><div class="status-dot dot-green"></div> <span id="mesh-node">NODE: ---</span></div>
            <div class="status-item"><div class="status-dot dot-orange" id="mesh-peer-dot"></div> <span id="mesh-peers">PEERS: 0</span></div>
            <div class="status-item"><span id="mesh-routes">ROUTES: 0</span></div>
        </div>

        <div id="contacts-panel">
            <span class="empty-contacts loading">⏳ LOADING CONTACTS...</span>
        </div>

        <main id="messages"></main>

        <footer>
            <div class="input-group">
                <input type="text" id="target" placeholder="TARGET SSID (ss-xxxx-pager)">
            </div>
            <input type="text" id="payload" placeholder="ENCRYPTED MESSAGE..." onkeydown="if(event.key==='Enter')send()">
            <div class="input-group actions">
                <button onclick="send()">📡 TRANSMIT</button>
                <button class="btn-small" onclick="logout()">LOGOUT</button>
                <button class="btn-small" onclick="loadContacts()" style="color:var(--neon)!important">↻ SCAN</button>
                <button class="btn-download" id="dl-kit-btn" onclick="downloadNodeKit()">⬇ NODE KIT</button>
            </div>
        </footer>
    </div>

    <script>
        const msgs = document.getElementById('messages');
        const lamp = document.getElementById('lamp');
        let mySsId = localStorage.getItem('pager_ss_id');
        let ws = null;

        async function registerAnon() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'SYNCING...';
            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    body: JSON.stringify({label: 'web-anon'}),
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await res.json();
                if (data.ssid || data.ss_id) {
                    mySsId = data.ssid || data.ss_id;
                    localStorage.setItem('pager_ss_id', mySsId);
                    initApp();
                }
            } catch(e) {
                btn.disabled = false;
                btn.textContent = '⚡ RETRY';
            }
        }

        async function loadContacts() {
            const panel = document.getElementById('contacts-panel');
            panel.innerHTML = '<span class="empty-contacts loading">⏳ SCANNING MESH...</span>';
            try {
                const res = await fetch('/contacts');
                const athletes = await res.json();
                panel.innerHTML = '';
                if (!athletes.length) {
                    panel.innerHTML = '<span class="empty-contacts">NO CONTACTS FOUND — MESH EMPTY</span>';
                    return;
                }
                athletes.forEach(a => {
                    const card = document.createElement('div');
                    card.className = 'contact-card';
                    const name = (a.display_name || a.first_name || a.username || a.name || 'ATHLETE').toUpperCase();
                    card.innerHTML = `${name}<div class="ssid">${a.ss_id}</div>`;
                    card.onclick = () => {
                        document.getElementById('target').value = a.ss_id;
                        document.getElementById('payload').focus();
                    };
                    panel.appendChild(card);
                });
            } catch(e) {
                panel.innerHTML = '<span class="empty-contacts">⚠ CONTACTS API OFFLINE</span>';
            }
        }

        async function loadMeshStatus() {
            try {
                const res = await fetch('/mesh/status');
                const status = await res.json();
                document.getElementById('mesh-node').textContent = `NODE: ${status.node_id}`;
                document.getElementById('mesh-peers').textContent = `PEERS: ${status.online_peers}/${status.total_peers}`;
                document.getElementById('mesh-routes').textContent = `ROUTES: ${status.known_routes}`;
                const dot = document.getElementById('mesh-peer-dot');
                dot.className = 'status-dot ' + (status.online_peers > 0 ? 'dot-green' : 'dot-orange');
            } catch(e) {}
        }

        async function downloadNodeKit() {
            const btn = document.getElementById('dl-kit-btn');
            btn.classList.add('btn-downloading');
            btn.textContent = '⏳ PACKING...';
            try {
                const res = await fetch('/download_node_kit');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'node_kit.tar.gz';
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
                btn.textContent = '✅ DONE';
                setTimeout(() => {
                    btn.classList.remove('btn-downloading');
                    btn.textContent = '⬇ NODE KIT';
                }, 2000);
            } catch(e) {
                btn.textContent = '⚠ FAILED';
                setTimeout(() => {
                    btn.classList.remove('btn-downloading');
                    btn.textContent = '⬇ NODE KIT';
                }, 2000);
            }
        }

        function initApp() {
            document.getElementById('reg-box').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            document.getElementById('my-id').textContent = `ID: ${mySsId}`;
            connectWS();
            loadContacts();
            loadMeshStatus();
            setInterval(loadMeshStatus, 30000);
        }

        function connectWS() {
            if (ws) ws.close();
            ws = new WebSocket(`ws://${location.host}/ws/${mySsId}`);
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                lamp.classList.add('active');
                setTimeout(() => lamp.classList.remove('active'), 2500);
                const div = document.createElement('div');
                div.className = 'msg inbound';
                div.innerHTML = `<div class="meta">[${new Date().toLocaleTimeString()}] FROM: ${d.from_ss || 'UNKNOWN'}</div>${d.text}`;
                msgs.prepend(div);
            };
            ws.onclose = () => { setTimeout(connectWS, 5000); };
            ws.onerror = () => { ws.close(); };
        }

        async function send() {
            const text = document.getElementById('payload').value.trim();
            const target = document.getElementById('target').value.trim();
            if (!text || !target) return;
            try {
                const res = await fetch('/message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text, target, from_ss: mySsId })
                });
                if (res.ok) {
                    const data = await res.json();
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = `<div class="meta">[${new Date().toLocaleTimeString()}] TO: ${target} | ${data.route || 'sent'}</div>${text}`;
                    msgs.prepend(div);
                    document.getElementById('payload').value = '';
                }
            } catch(e) {}
        }

        function logout() {
            localStorage.removeItem('pager_ss_id');
            location.reload();
        }

        if (mySsId) initApp();
        else document.getElementById('reg-box').style.display = 'block';
    </script>
</body>
</html>
